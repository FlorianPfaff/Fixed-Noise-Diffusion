inherits: cifar10_base.yaml

run_name: cifar100_base

data:
  dataset: cifar100
  data_dir: data
  download: true
  image_size: 32
  channels: 3
  batch_size: 128
  eval_batch_size: 128
  num_workers: 4
  subset_size:
  eval_subset_size: 2048

diffusion:
  beta_schedule: cosine

training:
  epochs: 100
  checkpoint_epochs: [1, 5, 10, 25, 50, 100]
  save_checkpoint: true

evaluation:
  denoising_batches: 16
  sample_count: 64
  sample_steps: 50
  sampler: ddim
  enable_metrics: false
