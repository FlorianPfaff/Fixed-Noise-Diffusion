---
name: Fixed-Noise Diffusion CI

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
    paths:
      - "src/fixed_noise_diffusion/**"
      - "tests/**"
      - "pyproject.toml"
      - "README.md"
      - ".github/workflows/fixed-noise-diffusion-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "src/fixed_noise_diffusion/**"
      - "tests/**"
      - "pyproject.toml"
      - "README.md"
      - ".github/workflows/fixed-noise-diffusion-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  tests-and-smoke:
    name: Tests + smoke (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -e ".[test]"

      - name: Run test suite
        run: |
          mkdir -p test-results
          python -m pytest \
            --rootdir . \
            -q \
            --strict-config \
            --junitxml=test-results/junit-py${{ matrix.python-version }}.xml \
            tests

      - name: Run synthetic diffusion smoke test
        run: |
          python -m fixed_noise_diffusion.train \
            --config smoke.yaml \
            --set device=cpu \
            --set output_dir=ci_runs \
            --set run_name=smoke_py${{ matrix.python-version }} \
            --set training.amp=false \
            --set evaluation.sample_count=1 \
            --set evaluation.sample_steps=2

      - name: Validate smoke outputs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          run_dir = Path("ci_runs/smoke_py${{ matrix.python-version }}")
          metrics_path = run_dir / "metrics.jsonl"
          metadata_path = run_dir / "run_metadata.json"
          summary_path = run_dir / "run_summary.json"
          assert metrics_path.exists(), "missing metrics.jsonl"
          assert metadata_path.exists(), "missing run_metadata.json"
          assert summary_path.exists(), "missing run_summary.json"
          rows = [json.loads(line) for line in metrics_path.read_text().splitlines()]
          eval_rows = [row for row in rows if row["type"] == "eval"]
          assert eval_rows, "missing eval row"
          eval_row = eval_rows[-1]
          for key in ("train_den_loss", "gaussian_den_loss", "denoising_gap"):
              assert key in eval_row, f"missing {key}"
          metadata = json.loads(metadata_path.read_text())
          summary = json.loads(summary_path.read_text())
          assert metadata["config_hash"] == summary["config_hash"]
          assert summary["status"] == "completed"
          assert (run_dir / "checkpoints" / "epoch_0001.pt").exists()
          assert (run_dir / "samples" / "epoch_0001.png").exists()
          print(eval_row)
          PY

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: junit-py${{ matrix.python-version }}
          path: test-results/junit-py${{ matrix.python-version }}.xml

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-py${{ matrix.python-version }}
          path: |
            ci_runs/smoke_py${{ matrix.python-version }}/metrics.*
            ci_runs/smoke_py${{ matrix.python-version }}/run_*.json
            ci_runs/smoke_py${{ matrix.python-version }}/samples/*.png

  package-smoke:
    name: Build package and verify module entry points
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Install built wheel with runtime dependencies
        run: |
          python -m pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          python -m pip install --force-reinstall dist/*.whl

      - name: Verify module entry points from built package
        run: |
          python -m fixed_noise_diffusion.train --help > /dev/null
          python -m fixed_noise_diffusion.plot_results --help > /dev/null
          python -m fixed_noise_diffusion.evaluate_sample_quality --help > /dev/null
          python -m fixed_noise_diffusion.summarize_sample_quality --help > /dev/null
          python -m fixed_noise_diffusion.evaluate_timestep_diagnostics --help > /dev/null
          python - <<'PY'
          from fixed_noise_diffusion.config import load_config

          config = load_config("smoke.yaml")
          assert config["run_name"] == "smoke"
          PY

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: fixed-noise-diffusion-package-dist
          path: dist/*

  publish-results:
    name: Publish unit test results
    needs:
      - tests-and-smoke
    if: always()
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: test-results

      - name: Publish test results
        if: (!cancelled())
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: "test-results/**/*.xml"
